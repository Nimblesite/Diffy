# agent-pmo:74cf183
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # E2E suite runs under xvfb on Linux so @vscode/test-electron can launch.
      - name: Format check
        run: make fmt CHECK=1

      - name: Lint
        run: make lint

      - name: Test (Linux, xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a make test

      - name: Test (macOS / Windows)
        if: runner.os != 'Linux'
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.os }}
          path: |
            coverage/
            lcov.info
          retention-days: 7

      - name: Build
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            out/
          retention-days: 7
